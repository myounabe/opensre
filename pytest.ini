[pytest]
testpaths = tests app
python_files = test_*.py *_test.py
norecursedirs = tests/test_case_upstream_downstream_pipeline tests/test_case_kubernetes cdk.out .git __pycache__ .pytest_cache .venv node_modules *.egg .tox
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: marks tests as integration tests (may make API calls)
